name: Send Synergy outreach email

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/send-synergy-email.yml'
      - 'scripts/send_synergy_email.py'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send email via QQ SMTP
        env:
          SMTP_HOST: 'smtp.qq.com'
          SMTP_PORT: '587'
          SMTP_USER: '2551925954@qq.com'
          SMTP_PASSWORD: ${{ secrets.QQ_SMTP_AUTH_CODE }}
          SMTP_FROM: '2551925954@qq.com'
          SMTP_TO: 'info@s-e.lt'
        run: python3 scripts/send_synergy_email.py
